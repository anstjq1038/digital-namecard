<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    background:
      radial-gradient(90% 120% at 92% -10%, #FBE6C2, transparent 55%),
      #FAF6EF;
    display:flex;align-items:stretch;
  }
  /* 왼쪽 사진 패널 */
  .left{
    flex:0 0 500px;
    background:linear-gradient(160deg,#F6ECD8,#F0E2C8);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:26px;padding:50px 44px;
  }
  .photo{
    width:100%;border-radius:22px;overflow:hidden;
    box-shadow:0 20px 40px -14px rgba(120,80,20,.4);
    border:5px solid #fff;
  }
  .photo img{width:100%;display:block}
  .badge{
    font-size:19px;font-weight:700;letter-spacing:.22em;
    color:#B9761F;background:#fff;
    padding:10px 22px;border-radius:999px;
    box-shadow:0 6px 16px -8px rgba(120,80,20,.4);
  }
  /* 오른쪽 텍스트 */
  .right{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 72px}
  .name{
    font-family:Georgia,serif;font-size:78px;font-weight:700;
    color:#2E2A26;line-height:1.05;letter-spacing:.01em;
  }
  .wave{margin:12px 0 20px;color:#DE922B}
  .role{font-size:29px;font-weight:700;color:#B9761F;margin-bottom:24px}
  .tags{display:flex;flex-wrap:wrap;gap:11px;margin-bottom:32px;max-width:560px}
  .tag{
    font-size:20px;font-weight:600;color:#8A6A2E;
    background:#F4E9D6;padding:9px 17px;border-radius:12px;
  }
  .phone{
    display:flex;align-items:center;gap:14px;
    font-size:29px;font-weight:700;color:#2E2A26;
    font-variant-numeric:tabular-nums;
  }
  .phone .dot{
    width:46px;height:46px;border-radius:13px;background:#DE922B;
    display:flex;align-items:center;justify-content:center;
  }
  .phone svg{width:24px;height:24px}
</style>
</head>
<body>
  <div class="left">
    <div class="photo"><img src="photo.jpg" alt=""></div>
    <div class="badge">유아교육 · 디지털 명함</div>
  </div>
  <div class="right">
    <div class="name">김하늘</div>
    <svg class="wave" width="120" height="14" viewBox="0 0 120 14" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><path d="M4 9 Q19 1 34 9 T64 9 T94 9 T118 9"/></svg>
    <div class="role">유아교육 프리랜서</div>
    <div class="tags">
      <span class="tag">유아 미술지도</span>
      <span class="tag">오감·놀이수업</span>
      <span class="tag">누리과정 연계</span>
      <span class="tag">발달 관찰·상담</span>
    </div>
    <div class="phone">
      <span class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
      <span>010-5819-9112</span>
    </div>
  </div>
</body>
</html>
