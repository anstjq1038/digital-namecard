<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#DE922B">
<title>디지털 명함</title>
<meta name="description" content="유아교육 프리랜서 정명옥 디지털 명함">
<!-- 카카오톡·문자 링크 미리보기(카드) 설정 -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://anstjq1038.github.io/digital-namecard/">
<meta property="og:title" content="정명옥 · 유아교육 프리랜서 (33년 경력)">
<meta property="og:description" content="놀이 속에서 자연스럽게 한글·수학·가베를 배워요 · 문의 010-5819-9112">
<meta property="og:image" content="https://anstjq1038.github.io/digital-namecard/og.png?v=4">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
  /* ===========================================================
     색 토큰 — 라이트 / 다크 모두 대응
     =========================================================== */
  :root{
    --paper:#FAF6EF;        /* 바탕 종이빛 */
    --card:#FFFFFF;
    --ink:#2E2A26;          /* 따뜻한 먹빛 글자 */
    --ink-soft:#6E655B;     /* 보조 글자 */
    --line:#EBE1D2;         /* 카드 선 */
    --accent:#DE922B;       /* 꿀빛 앰버 포인트 */
    --accent-deep:#B9761F;
    --accent-wash:#FBEFD9;  /* 태그 배경 */
    --shadow:rgba(58,44,20,.10);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#1C1916; --card:#26221E; --ink:#F2EBDF; --ink-soft:#B4A895;
      --line:#3A342D; --accent:#EEAB4C; --accent-deep:#F0B968;
      --accent-wash:#332A1D; --shadow:rgba(0,0,0,.4);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}

  .stage{
    min-height:100vh;
    background:
      radial-gradient(120% 60% at 50% -10%, color-mix(in srgb,var(--accent) 14%, transparent), transparent 60%),
      var(--paper);
    color:var(--ink);
    font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;align-items:flex-start;
    padding:32px 18px 48px;
  }

  .card{
    width:100%;max-width:400px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:26px;
    padding:38px 26px 30px;
    box-shadow:0 18px 50px -20px var(--shadow);
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
    overflow:hidden;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.card{animation:none}}

  /* 상단 사진 배너 */
  .hero{
    margin:-38px -26px 22px;
    height:210px;
    overflow:hidden;
    background:var(--accent-wash);
    border-bottom:1px solid var(--line);
  }
  .hero img{
    width:100%;height:100%;
    object-fit:cover;object-position:center 42%;
    display:block;
  }

  .name{
    text-align:center;margin:0;
    font-family:Georgia,"Nanum Myeongjo",serif;
    font-size:27px;font-weight:700;letter-spacing:.01em;
    text-wrap:balance;
  }
  .role{
    text-align:center;margin:7px 0 0;
    color:var(--accent-deep);font-weight:600;font-size:14px;
    letter-spacing:.02em;
  }
  .wave{display:block;width:44px;height:8px;margin:14px auto 0;color:var(--accent);opacity:.7}

  .bio{
    text-align:center;color:var(--ink-soft);
    font-size:14.5px;line-height:1.65;
    margin:18px auto 0;max-width:32ch;
    word-break:keep-all;
  }

  /* 전문분야 태그 */
  .tags{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    margin:22px 0 4px;
  }
  .tag{
    background:var(--accent-wash);color:var(--accent-deep);
    font-size:12.5px;font-weight:600;
    padding:6px 12px;border-radius:999px;
  }

  .divider{height:1px;background:var(--line);margin:24px 0}

  /* 연락처 줄 */
  .contacts{display:flex;flex-direction:column;gap:2px}
  .row{
    display:flex;align-items:center;gap:14px;
    padding:11px 8px;border-radius:12px;
    color:inherit;text-decoration:none;
    transition:background .15s;
  }
  .row:hover,.row:focus-visible{background:var(--accent-wash);outline:none}
  .row .ic{
    width:38px;height:38px;flex:0 0 38px;border-radius:11px;
    background:var(--accent-wash);color:var(--accent-deep);
    display:flex;align-items:center;justify-content:center;
  }
  .row .ic svg{width:19px;height:19px}
  .row .meta{display:flex;flex-direction:column;line-height:1.35;min-width:0}
  .row .lbl{font-size:11px;color:var(--ink-soft);letter-spacing:.03em}
  .row .val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* 버튼 */
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:26px}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:14px;border-radius:14px;border:none;cursor:pointer;
    font-family:inherit;font-size:15px;font-weight:700;
  }
  .btn svg{width:18px;height:18px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-deep)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent-deep)}
  .btn-row{display:flex;gap:10px}
  .btn-row .btn{flex:1}

  .foot{
    text-align:center;margin:22px 0 0;
    font-size:11.5px;color:var(--ink-soft);letter-spacing:.03em;
  }
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);
    padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;
    opacity:0;pointer-events:none;transition:.25s;z-index:9;
  }
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="stage">
  <main class="card" id="card">
    <div class="hero"><img id="photo" src="photo.jpg" alt="아이들과 함께 만든 색색의 링·도형 미술 작품"></div>
    <h1 class="name" id="name">정명옥</h1>
    <p class="role" id="role">유아교육 프리랜서 · 33년 경력</p>
    <svg class="wave" viewBox="0 0 44 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 5 Q8 1 14 5 T26 5 T38 5"/></svg>

    <p class="bio" id="bio">아이들의 눈높이에서 놀이와 예술로
    성장을 돕는 유아교육 전문가입니다.</p>

    <div class="tags" id="tags"></div>

    <div class="divider"></div>

    <nav class="contacts" id="contacts"></nav>

    <div class="actions">
      <button class="btn btn-primary" id="callBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        전화 걸기
      </button>
      <button class="btn btn-ghost" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        명함 공유
      </button>
    </div>

    <p class="foot" id="foot">서울·경기 방문 수업 · 상담 문의 환영</p>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   ▼▼▼  여기 값만 바꾸면 명함 내용이 전부 바뀝니다  ▼▼▼
   (아래 예시를 어머니 실제 정보로 교체하세요)
   ================================================================ */
const CARD = {
  이름:        "정명옥",
  직함:        "유아교육 프리랜서 · 33년 경력",
  사진:        "photo.jpg",          // 상단 배너 사진 파일명 (같은 폴더에 두면 됩니다)
  소개:        "아이들의 눈높이에서 놀이와 예술로\n성장을 돕는 유아교육 전문가입니다.",  // \n 위치에서 줄바꿈
  전문분야:    ["한글놀이", "수학놀이", "가베놀이"],
  전화번호:    "010-5819-9112",
  하단문구:    "상담 문의 언제든 환영합니다"
};
/* ================================================================
   ▲▲▲  수정 끝. 아래는 건드리지 않아도 됩니다.  ▲▲▲
   ================================================================ */

const ic = {
  phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',
  chat:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  mail:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/>',
  pin:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>'
};
const svg = p => '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';

// 텍스트 채우기
document.getElementById('photo').src          = CARD.사진;
document.getElementById('name').textContent   = CARD.이름;
document.getElementById('role').textContent   = CARD.직함;
document.getElementById('bio').innerHTML      = CARD.소개.replace(/\n/g, '<br>');
document.getElementById('foot').textContent   = CARD.하단문구;
document.title = CARD.이름 + " · 디지털 명함";

// 전문분야 태그
document.getElementById('tags').innerHTML =
  CARD.전문분야.map(t => '<span class="tag">'+t+'</span>').join('');

// 연락처 줄 구성
const rows = [
  {ic:ic.phone, lbl:'전화', val:CARD.전화번호, href:'tel:'+CARD.전화번호.replace(/[^0-9+]/g,'')}
].filter(r => r.val);

document.getElementById('contacts').innerHTML = rows.map(r => {
  const tag = r.href ? 'a' : 'div';
  const attr = r.href ? ' href="'+r.href+'"' : '';
  return '<'+tag+' class="row"'+attr+'>'
       + '<span class="ic">'+svg(r.ic)+'</span>'
       + '<span class="meta"><span class="lbl">'+r.lbl+'</span>'
       + '<span class="val">'+r.val+'</span></span></'+tag+'>';
}).join('');

// 전화 걸기
document.getElementById('callBtn').onclick = () =>
  location.href = 'tel:'+CARD.전화번호.replace(/[^0-9+]/g,'');

// 토스트
let tmr;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(tmr); tmr = setTimeout(()=>t.classList.remove('on'), 2200);
}

// 명함 공유
document.getElementById('shareBtn').onclick = async () => {
  const data = {title:CARD.이름+' 명함', text:CARD.이름+' · '+CARD.직함, url:location.href};
  if(navigator.share){
    try{ await navigator.share(data); }catch(e){}
  }else if(navigator.clipboard){
    try{ await navigator.clipboard.writeText(location.href); toast('링크를 복사했어요'); }
    catch(e){ toast('주소창의 링크를 복사해 공유하세요'); }
  }else{
    toast('주소창의 링크를 복사해 공유하세요');
  }
};
</script>
</body>
</html>
