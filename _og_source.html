<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    background:
      radial-gradient(90% 120% at 88% -10%, #FBE6C2, transparent 55%),
      radial-gradient(70% 90% at 0% 110%, #F7EAD6, transparent 55%),
      #FAF6EF;
    display:flex;align-items:center;gap:64px;
    padding:0 88px;
  }
  .left{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:22px}
  .avatar{
    width:220px;height:220px;border-radius:50%;
    background:linear-gradient(150deg,#E7A23B,#B9761F);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:Georgia,serif;font-size:96px;font-weight:700;
    box-shadow:0 24px 48px -14px rgba(185,118,31,.55);
  }
  .badge{
    font-size:19px;font-weight:700;letter-spacing:.24em;
    color:#B9761F;background:#FBEFD9;
    padding:9px 20px;border-radius:999px;
  }
  .right{flex:1;min-width:0}
  .name{
    font-family:Georgia,serif;font-size:82px;font-weight:700;
    color:#2E2A26;line-height:1.05;letter-spacing:.01em;
  }
  .wave{margin:14px 0 22px;color:#DE922B}
  .role{
    font-size:31px;font-weight:700;color:#B9761F;margin-bottom:26px;
  }
  .tags{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:34px;max-width:620px}
  .tag{
    font-size:21px;font-weight:600;color:#8A6A2E;
    background:#F4E9D6;padding:9px 18px;border-radius:12px;
  }
  .phone{
    display:flex;align-items:center;gap:14px;
    font-size:30px;font-weight:700;color:#2E2A26;
    font-variant-numeric:tabular-nums;
  }
  .phone .dot{
    width:46px;height:46px;border-radius:13px;background:#DE922B;
    display:flex;align-items:center;justify-content:center;
  }
  .phone svg{width:24px;height:24px}
</style>
</head>
<body>
  <div class="left">
    <div class="avatar" id="og-initial">김</div>
    <div class="badge">유아교육 · 디지털 명함</div>
  </div>
  <div class="right">
    <div class="name" id="og-name">김하늘</div>
    <svg class="wave" width="120" height="14" viewBox="0 0 120 14" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><path d="M4 9 Q19 1 34 9 T64 9 T94 9 T118 9"/></svg>
    <div class="role" id="og-role">유아교육 프리랜서</div>
    <div class="tags" id="og-tags">
      <span class="tag">유아 미술지도</span>
      <span class="tag">오감·놀이수업</span>
      <span class="tag">누리과정 연계</span>
      <span class="tag">발달 관찰·상담</span>
    </div>
    <div class="phone">
      <span class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
      <span id="og-phone">010-5819-9112</span>
    </div>
  </div>
</body>
</html>
